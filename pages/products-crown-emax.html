<header class="about-header text-center text-white d-flex align-items-center" style="background: linear-gradient(rgba(107, 142, 35, 0.9), rgba(34, 34, 34, 0.6)), url('../img/header.jpg') no-repeat center center; background-size: cover; padding: 80px 0 50px 0; min-height: 220px;">
  <div class="container">
    <h1 class="display-4 font-weight-bold" style="color: #ffffff; font-size: 34px; margin-bottom: 5px; letter-spacing: 1px;">IPS e.max® Gallery</h1>
    <p class="lead" style="color: rgba(255,255,255,0.8); font-size: 15px; font-style: italic;">High-translucency lithium disilicate glass-ceramic case exhibition.</p>
    <a href="{{ site.baseurl }}/pages/products-crown.html" style="color: #ffffff; text-decoration: underline; font-size: 13px;">
      <i class="fa fa-chevron-left"></i> Back to Crown & Bridge
    </a>
  </div>
</header>

<section style="padding: 60px 0; background-color: #f9f9f9;">
  <div class="container">
    <div id="emax-gallery-container" class="row">
      </div>
  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const container = document.getElementById("emax-gallery-container");

  // 같은 pages 폴더 안에 있는 emax-products.json을 불러옵니다.
  fetch("./emax-products.json")
    .then(response => {
      if (!response.ok) throw new Error("데이터를 불러오지 못했습니다.");
      return response.json();
    })
    .then(data => {
      const cardHTML = data.map(item => {
        // 비디오 타입 확장성을 고려한 미디어 태그 분기
        let mediaHTML = '';
        if (item.type === 'video') {
          mediaHTML = `
            <div style="position:relative; padding-top:56.25%; width:100%;">
              <iframe src="${item.videoUrl}" style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" allowfullscreen></iframe>
            </div>`;
        } else if (item.type === 'mp4') {
          mediaHTML = `<video src="${item.videoFile}" controls autoplay loop muted style="width: 100%; height: auto; display: block;"></video>`;
        } else {
          mediaHTML = `<img src="${item.image}" class="img-responsive" alt="${item.title}" style="width: 100%;">`;
        }

        return `
          <div class="col-md-4 col-sm-6" style="margin-bottom: 30px;">
            <div style="background: #ffffff; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);">
              ${mediaHTML}
              <div style="padding: 15px;">
                <h4 style="color: #6B8E23; font-weight: 700; margin-top: 0; margin-bottom: 5px;">${item.title}</h4>
                <p class="text-muted" style="font-size: 13px; margin-bottom: 0;">${item.description}</p>
              </div>
            </div>
          </div>
        `;
      }).join("");

      container.innerHTML = cardHTML;
    })
    .catch(error => {
      console.error("Error:", error);
      container.innerHTML = `<div class="col-12 text-center"><p>데이터를 로드하는 중 오류가 발생했습니다.</p></div>`;
    });
});
</script>
