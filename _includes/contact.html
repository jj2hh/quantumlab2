<section id="contact" style="padding: 100px 0; background-color: #f9f9f9;">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center" style="margin-bottom: 60px;">
        <h2 class="section-heading" style="color: #6B8E23; font-weight: 800; font-size: 38px; letter-spacing: 1px; margin-bottom: 15px;">Contact Us</h2>
        <p class="text-muted" style="font-size: 16px; font-style: italic;">We'd love to hear from you. Get in touch with us today.</p>
        <hr class="primary" style="max-width: 50px; border-width: 3px; border-color: #6B8E23; margin-top: 20px;">
      </div>
    </div>
    
    <div class="row">
      <div class="col-lg-6" style="margin-bottom: 40px;">
        <div style="border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); height: 100%; min-height: 400px;">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2887.2613580536415!2d-79.39185012340578!3d43.64276185344332!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x882b34d31481b67d%3A0x63db6c17e65df05b!2sCN%20Tower!5e0!3m2!1sko!2sca!4v1710000000000!5m2!1sko!2sca" 
            width="100%" 
            height="100%" 
            style="border:0; min-height: 400px; display: block;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>

      <div class="col-lg-5 col-lg-offset-1">
        <div style="display: flex; align-items: flex-start; margin-bottom: 25px;">
          <div class="text-center" style="width: 50px; margin-right: 15px;">
            <i class="fa fa-map-marker fa-2x text-primary"></i>
          </div>
          <div>
            <h4 style="margin-top: 0; font-weight: bold;">Our Lab Address</h4>
            <p class="text-muted">123 Dental St, Toronto, ON, M5V 2T6, Canada</p>
          </div>
        </div>

        <div style="display: flex; align-items: flex-start; margin-bottom: 25px;">
          <div class="text-center" style="width: 50px; margin-right: 15px;">
            <i class="fa fa-phone fa-2x text-primary"></i>
          </div>
          <div>
            <h4 style="margin-top: 0; font-weight: bold;">Phone</h4>
            <p class="text-muted">+1 (416) 555-0199</p>
          </div>
        </div>

        <div style="display: flex; align-items: flex-start;">
          <div class="text-center" style="width: 50px; margin-right: 15px;">
            <i class="fa fa-clock-o fa-2x text-primary"></i>
          </div>
          <div>
            <h4 style="margin-top: 0; font-weight: bold;">Hours of Operation</h4>
            <p class="text-muted" style="line-height: 1.6;">
              Mon - Fri: 9:00 AM - 6:00 PM<br>
            </p>
          </div>
        </div>
        
        <div style="display: flex; align-items: flex-start; margin-bottom: 25px;">
          <div class="text-center" style="width: 50px; margin-right: 15px;">
            <i class="fa fa-envelope-o fa-2x text-primary"></i>
          </div>
          <div>
            <h4 style="margin-top: 0; font-weight: bold;">Email</h4>
            <p class="text-muted"><a href="mailto:{{ site.email }}" class="text-primary" style="font-weight: 50px;">{{ site.email }}</a></p>
          </div>
        </div>

        <div style="margin-top: 40px; margin-bottom: 40px; background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);">
          <h4 style="font-weight: bold; margin-top: 0; margin-bottom: 20px; color: #6B8E23;">Send us a Message</h4>
          <form action="https://formspree.io/f/mkolonyl" method="POST">
            <div class="form-group" style="margin-bottom: 15px;">
              <input type="text" name="name" class="form-control" placeholder="Your Name" required style="border-radius: 4px; padding: 12px; height: auto;">
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
              <input type="email" name="email" class="form-control" placeholder="Your Email" required style="border-radius: 4px; padding: 12px; height: auto;">
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
              <textarea name="message" class="form-control" rows="5" placeholder="Your Message" required style="border-radius: 4px; padding: 12px;"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="padding: 12px 25px; font-weight: bold; width: 100%; background-color: #6B8E23; border: none;">Submit Form</button>
          </form>
        </div>

      </div>
    </div>
  </div>
</section>
